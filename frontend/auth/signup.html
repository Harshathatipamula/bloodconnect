<!DOCTYPE html>
<html>
<head>
  <title>Signup - Blood Donation Portal</title>
  <link rel="stylesheet" href="auth.css">

  <style>
    .google-btn {
      width: 100%;
      padding: 12px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      margin-top: 10px;
    }

    .google-btn:hover {
      background: #f5f5f5;
    }
  </style>
</head>

<body>

<div class="auth-container">
  <h2>Create Account</h2>
  <p>Register as donor or recipient</p>

  <form id="signupForm">

    <div class="input-group">
      <label>Name</label>
      <input type="text" id="name" required>
    </div>

    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>


    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>

    
    <button type="submit" class="btn-primary">
      Create Account
    </button>

    <hr style="margin:20px 0;">

    <button type="button" id="googleBtn" class="google-btn">
      Sign in with Google
    </button>

  </form>

  <div class="switch-text">
    Already have an account? 
    <a href="login.html">Login</a>
  </div>
</div>

<!-- Firebase + Signup Logic -->
<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCOpNxLh3naiiz8RDQwTgcNtZd_ugg_2RQ",
    authDomain: "online-blood-donation-portal.firebaseapp.com",
    projectId: "online-blood-donation-portal",
    appId: "1:600816180299:web:a5fd55ea374268598b01ce"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // GOOGLE LOGIN
  document.getElementById("googleBtn").addEventListener("click", async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;

      const idToken = await user.getIdToken();

      const response = await fetch("http://localhost:5000/api/auth/google", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: idToken })
      });

      const data = await response.json();
      console.log(data);

      alert("Google Login Success");

    } catch (error) {
      console.error(error);
      alert("Google Login Failed");
    }
  });

  // NORMAL SIGNUP
 
</script>
<script>
document.getElementById("signupForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
 

  try {
    const response = await fetch("http://localhost:5000/api/auth/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
    body: JSON.stringify({
  name,
  email,
  password
})
    });

    const data = await response.json();

    if (response.ok) {
      alert("Signup Successful");
      window.location.href = "login.html";
    } else {
      alert(data.message || "Signup Failed");
    }

  } catch (error) {
    console.error(error);
    alert("Signup Failed");
  }
});
</script>

</body>
</html>
