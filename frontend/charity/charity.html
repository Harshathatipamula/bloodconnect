<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Support Our Mission | BloodConnect</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(rgba(200,0,0,0.85), rgba(150,0,0,0.85)),
                url("../home/hospital-bg.jpg") center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    background: white;
    width: 420px;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    text-align: center;
}

h1 {
    margin-bottom: 10px;
    color: #c40000;
}

.subtitle {
    color: #555;
    margin-bottom: 30px;
}

.qr-box {
    background: #f9f9f9;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #eee;
    margin-bottom: 25px;
}

.qr-box img {
    width: 220px;
    height: 220px;
    object-fit: contain;
}

.upi-section {
    background: #fff5f5;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #ffcaca;
}

.upi-label {
    font-size: 14px;
    color: #666;
}

.upi-id {
    font-size: 18px;
    font-weight: bold;
    color: #c40000;
    cursor: pointer;
    margin-top: 5px;
    display: inline-block;
    transition: 0.2s;
}

.upi-id:hover {
    color: #ff0000;
}

.copy-message {
    margin-top: 8px;
    font-size: 13px;
    color: green;
    display: none;
}

.thank-you {
    margin-top: 25px;
    font-size: 14px;
    color: #444;
}

@media (max-width: 500px) {
    .container {
        width: 90%;
        padding: 25px;
    }

    .qr-box img {
        width: 180px;
        height: 180px;
    }
}


/* Disable text selection globally */
body {
  user-select: none;
}

/* Allow selection ONLY inside input and textarea */
input,
textarea {
  user-select: text;
}

</style>
</head>

<body>

<div class="container">

    <h1>❤️ Support Our Mission</h1>
    <p class="subtitle">
        Your contribution helps save lives through emergency blood support.
    </p>

    <div class="qr-box">
        <!-- 🔴 Replace this image with YOUR QR -->
        <img src="fampay.png" alt="Scan to Donate">
    </div>

    <div class="upi-section">
        <div class="upi-label">UPI ID (Tap to Copy)</div>
        <div class="upi-id" id="upiText">
            8149933516@fam
        </div>
        <div class="copy-message" id="copyMsg">
            ✅ UPI ID Copied Successfully!
        </div>
    </div>

    <div class="thank-you">
        After completing payment, your support directly strengthens
        BloodConnect’s emergency response system.
    </div>

</div>

<script>
const upiText = document.getElementById("upiText");
const copyMsg = document.getElementById("copyMsg");

upiText.addEventListener("click", () => {
    navigator.clipboard.writeText(upiText.innerText);
    copyMsg.style.display = "block";

    setTimeout(() => {
        copyMsg.style.display = "none";
    }, 2000);
});
</script>

</body>
</html>
