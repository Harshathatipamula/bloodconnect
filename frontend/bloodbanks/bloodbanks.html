<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nearby Blood Banks</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(255,255,255,0.92), rgba(255,255,255,0.92)),
                        url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-attachment: fixed;
        }

        /* ===== HEADER ===== */
        .top-header {
            background: linear-gradient(135deg, #b30000, #ff1a1a);
            padding: 35px 20px;
            color: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }

        .header-content {
            max-width: 1100px;
            margin: auto;
        }

        .top-header h1 {
            margin: 0 0 20px 0;
            font-size: 28px;
            font-weight: 700;
        }

        .search-controls {
            display: flex;
            align-items: flex-end;
            gap: 20px;
            flex-wrap: wrap;
        }

        .radius-box {
            display: flex;
            flex-direction: column;
        }

        .radius-box label {
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .radius-box select {
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            min-width: 120px;
        }

        .search-controls button {
            padding: 13px 22px;
            border-radius: 8px;
            border: none;
            background: white;
            color: #b30000;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-controls button:hover {
            background: #ffe6e6;
            transform: translateY(-2px);
        }

        /* ===== MAP ===== */
        #map {
            height: 450px;
            margin: 20px auto;
            max-width: 1100px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        /* ===== LIST ===== */
        #list {
            max-width: 1100px;
            margin: 20px auto 60px auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .card strong {
            color: #b30000;
            font-size: 16px;
        }

        .card button {
            margin-top: 10px;
            padding: 8px 14px;
            background: #b30000;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .card button:hover {
            background: #800000;
        }

        /* ===== LOADING SPINNER ===== */
        .spinner {
            text-align: center;
            margin: 20px;
            font-weight: bold;
            display: none;
        }


        /* Disable text selection globally */
body {
  user-select: none;
}

/* Allow selection ONLY inside input and textarea */
input,
textarea {
  user-select: text;
}
    </style>
</head>

<body>

<header class="top-header">
    <div class="header-content">
        <h1> Find Blood Banks & Hospitals Near You</h1>

        <div class="search-controls">
            <div class="radius-box">
                <label>Search Radius</label>
                <select id="radius">
                    <option value="5">5 KM</option>
                    <option value="10">10 KM</option>
                    <option value="20">20 KM</option>
                </select>
            </div>

            <button onclick="findBloodBanks()"> Search Nearby</button>
        </div>
    </div>
</header>

<div id="map"></div>

<div class="spinner" id="loading">Searching nearby blood banks...</div>

<div id="list"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map;
let userLat, userLng;

function initMap(lat, lng) {
    if (!map) {
        map = L.map('map').setView([lat, lng], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
    } else {
        map.setView([lat, lng], 13);
    }

    L.marker([lat, lng]).addTo(map)
        .bindPopup("You are here")
        .openPopup();
}

function findBloodBanks() {

    document.getElementById("list").innerHTML = "";
    document.getElementById("loading").style.display = "block";

    navigator.geolocation.getCurrentPosition(async position => {

        userLat = position.coords.latitude;
        userLng = position.coords.longitude;

        initMap(userLat, userLng);

        const radius = document.getElementById("radius").value;

        const query = `
        [out:json];
        node["amenity"="hospital"](around:${radius * 1000},${userLat},${userLng});
        out;
        `;

        const response = await fetch("https://overpass-api.de/api/interpreter", {
            method: "POST",
            body: query
        });

        const data = await response.json();

        document.getElementById("loading").style.display = "none";

        data.elements.forEach(place => {

            const lat = place.lat;
            const lon = place.lon;

            const distance = getDistance(userLat, userLng, lat, lon);

           const name = place.tags.name || "Hospital";
const address = place.tags["addr:full"] 
                || place.tags["addr:street"] 
                || "Address not available";

const popupContent = `
    <div style="min-width:220px;">
        <h3 style="margin:0 0 5px 0; color:#b30000;">
            ${name}
        </h3>
        <p style="margin:4px 0; font-size:13px;">
            ${address}
        </p>
        <p style="margin:4px 0; font-weight:bold;">
            Distance: ${distance.toFixed(2)} KM
        </p>
        <button 
            style="
                margin-top:6px;
                padding:6px 10px;
                background:#b30000;
                color:white;
                border:none;
                border-radius:5px;
                cursor:pointer;
            "
            onclick="getDirections(${lat}, ${lon})"
        >
            Get Directions
        </button>
    </div>
`;

L.marker([lat, lon])
    .addTo(map)
    .bindPopup(popupContent);


            document.getElementById("list").innerHTML += `
                <div class="card">
                    <strong>${place.tags.name || "Hospital"}</strong><br>
                    Distance: ${distance.toFixed(2)} KM<br>
                    <button onclick="getDirections(${lat}, ${lon})">
                        Get Directions
                    </button>
                </div>
            `;
        });

    });
}

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI/180) *
        Math.cos(lat2 * Math.PI/180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

function getDirections(lat, lon) {
    const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;
    window.open(url, "_blank");
}

</script>

</body>
</html>
